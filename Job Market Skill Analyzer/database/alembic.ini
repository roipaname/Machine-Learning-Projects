# alembic.ini — Alembic configuration for Job Market Analyzer

[alembic]
# Path to migration scripts (relative to this file)
script_location = src/database/migrations

# Template for new migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Max length of the slug in filenames
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

# SQLAlchemy URL — overridden dynamically in env.py from .env
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/job_market_analyzer


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
